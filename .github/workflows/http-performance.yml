name: HTTP performance benchmark
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Measured seconds per run'
        required: true
        default: '15'
      repeats:
        description: 'Runs per server'
        required: true
        default: '3'
jobs:
  benchmark:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm gcc cmake ninja pkgconf openssl curl util-linux python python-pip jdk17-openjdk maven git make
      - name: Install FastAPI
        run: |
          python3 -m venv .benchmark-venv
          . .benchmark-venv/bin/activate
          pip install fastapi uvicorn websockets
          echo "${PWD}/.benchmark-venv/bin" >> "$GITHUB_PATH"
      - name: Build pinned benchmark matrix
        run: benchmarks/http/scripts/build.sh
      - name: Run pinned benchmark
        env:
          BENCH_DURATION: ${{ inputs.duration }}
          BENCH_REPEATS: ${{ inputs.repeats }}
          BENCH_WORKERS: '2'
          BENCH_WRK_THREADS: '2'
          BENCH_CONNECTIONS: '256'
        run: benchmarks/http/scripts/run.sh
      - name: Publish HTML report
        uses: actions/upload-artifact@v4
        with:
          name: http-performance-report
          path: .benchmark-build/results/
