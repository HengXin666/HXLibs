name: HTTP 性能压测
on:
  workflow_dispatch:
    inputs:
      duration:
        description: '每轮正式采样秒数（建议至少 60 秒）'
        required: true
        default: '60'
      warmup:
        description: '每轮预热秒数'
        required: true
        default: '15'
      repeats:
        description: '每个实现 / 优化 / 场景的重复轮次'
        required: true
        default: '3'
      cooldown:
        description: '轮次间冷却秒数'
        required: true
        default: '3'
jobs:
  benchmark:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm clang gcc cmake ninja pkgconf openssl pcre2 curl unzip util-linux python python-pip jdk17-openjdk maven git make
      - name: Install FastAPI
        run: |
          python3 -m venv .benchmark-venv
          . .benchmark-venv/bin/activate
          pip install fastapi uvicorn websockets
          echo "${PWD}/.benchmark-venv/bin" >> "$GITHUB_PATH"
      - name: 构建固定版本的 Clang O2 / O3 矩阵
        run: benchmarks/http/scripts/build.sh
      - name: 运行长时多场景压测
        env:
          BENCH_DURATION: ${{ inputs.duration }}
          BENCH_WARMUP: ${{ inputs.warmup }}
          BENCH_REPEATS: ${{ inputs.repeats }}
          BENCH_COOLDOWN: ${{ inputs.cooldown }}
        run: benchmarks/http/scripts/run.sh
      - name: 发布中文 HTML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-performance-report
          path: .benchmark-build/results/
