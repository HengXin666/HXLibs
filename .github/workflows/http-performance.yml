name: HTTP performance benchmark
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Measured seconds per run'
        required: true
        default: '15'
      repeats:
        description: 'Runs per server'
        required: true
        default: '3'
jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake g++ curl libssl-dev libpcre3-dev zlib1g-dev util-linux openjdk-17-jdk maven
      - name: Install FastAPI
        run: python3 -m pip install --break-system-packages fastapi uvicorn websockets
      - name: Build pinned benchmark matrix
        run: benchmarks/http/scripts/build.sh
      - name: Run pinned benchmark
        env:
          BENCH_DURATION: ${{ inputs.duration }}
          BENCH_REPEATS: ${{ inputs.repeats }}
          BENCH_WORKERS: '2'
          BENCH_WRK_THREADS: '2'
          BENCH_CONNECTIONS: '256'
        run: benchmarks/http/scripts/run.sh
      - name: Publish HTML report
        uses: actions/upload-artifact@v4
        with:
          name: http-performance-report
          path: .benchmark-build/results/
